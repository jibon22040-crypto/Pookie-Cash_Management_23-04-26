<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pookie Cash ✨</title>
    <style>
        :root {
            --primary-pink: #ffafcc;
            --secondary-pink: #ffc8dd;
            --soft-purple: #cdb4db;
            --accent-green: #bde0fe; /* Soft blue for balance */
            --glass-bg: rgba(255, 255, 255, 0.7);
            --text-dark: #5a4a4a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* Nav Styling */
        nav {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--secondary-pink);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* Centered links look cuter */
            overflow: hidden;
        }

        ul li a {
            display: block;
            color: var(--text-dark);
            text-align: center;
            padding: 18px 24px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        ul li a:hover {
            color: var(--primary-pink);
            transform: translateY(-2px);
        }

        ul li a.active {
            color: var(--primary-pink);
            border-bottom: 3px solid var(--primary-pink);
        }

        /* Content Container */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            animation: fadeIn 0.8s ease-in;
        }

        /* Heading Styles */
        h2 {
            font-size: 2rem;
            color: #d88fa9;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        /* Custom Scrollbar for the vibe */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--secondary-pink);
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Mobile Nav */
        @media screen and (max-width: 600px) {
            ul { flex-direction: column; text-align: center; }
            ul li { float: none; }
        }
    </style>
</head>
<body>

    <nav>
        {% include "myapp/master/nav.html" %}
    </nav>

    <div class="container">
        {% block body %}
        {% endblock body %}
    </div>

</body>
</html>
