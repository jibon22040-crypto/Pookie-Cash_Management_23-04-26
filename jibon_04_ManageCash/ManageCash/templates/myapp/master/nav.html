<nav class="pookie-navbar">
    <div class="nav-brand">
        <a href="{% url 'Dashboard' %}">
            <span class="brand-icon">🎀</span> PookiePocket
        </a>
    </div>

    <ul class="pookie-nav-links">
        <div class="nav-group-main">
            <li><a href="{% url 'Dashboard' %}" class="{% if request.resolver_match.url_name == 'Dashboard' %}active{% endif %}">🏠 Dashboard</a></li>
            <li><a href="{% url 'profile' %}" class="{% if request.resolver_match.url_name == 'profile' %}active{% endif %}">✨ Profile</a></li>
        </div>

        <div class="nav-group-settings">
            <li><a href="{% url 'change_password_view' %}">🔐 Security</a></li>
            <li><a href="{% url 'logout' %}" class="logout-link">Bye-bye 👋</a></li>
        </div>
    </ul>
</nav>

<style>
    .pookie-navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 30px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        border-radius: 0 0 25px 25px;
        box-shadow: 0 8px 20px rgba(255, 182, 193, 0.25);
        border-bottom: 2px solid #ffe5ec;
    }

    /* Brand / Website Name Styling */
    .nav-brand a {
        text-decoration: none;
        font-size: 22px;
        font-weight: 900;
        color: #ff85a1;
        display: flex;
        align-items: center;
        gap: 8px;
        letter-spacing: -0.5px;
    }

    .brand-icon {
        font-size: 24px;
        filter: drop-shadow(0 2px 4px rgba(255, 133, 161, 0.3));
    }

    /* Navigation Links Container */
    .pookie-nav-links {
        display: flex;
        align-items: center;
        gap: 20px;
        list-style: none;
        margin: 0;
        padding: 0;
    }

    .nav-group-main, .nav-group-settings {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    /* Vertical Divider */
    .nav-group-main::after {
        content: "";
        height: 25px;
        width: 2px;
        background-color: #ffe5ec;
        margin-left: 10px;
    }

    .pookie-nav-links li a {
        display: block;
        color: #5a4a4a; /* High contrast dark gray */
        text-align: center;
        padding: 10px 16px;
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border-radius: 15px;
    }

    /* Hover & Active States */
    .pookie-nav-links li a:hover {
        background-color: #fff0f5;
        color: #ff85a1;
        transform: translateY(-3px);
    }

    .pookie-nav-links li a.active {
        background-color: #ffafcc;
        color: white !important;
        box-shadow: 0 4px 12px rgba(255, 175, 204, 0.4);
    }

    .logout-link:hover {
        background-color: #ffd6d6 !important;
        color: #ff4d4d !important;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .pookie-navbar { flex-direction: column; gap: 15px; padding: 20px; }
        .nav-group-main::after { display: none; }
    }
</style>
